<div class="recent-posts">
    <h2>Recent Posts</h2>

    <!-- Loading state -->
    @if (loading) {
    <div class="loader">Loading posts...</div>
    }

    <!-- Error state -->
    @if (error) {
    <div class="error">{{ error }}</div>
    }

    <!-- Posts list -->
    @if (!loading && !error) {
    @if (posts$ | async; as posts) {
    @for (post of posts; track post._id) {
    <app-post-item [post]="post" />
    }
    }
    }
</div>
